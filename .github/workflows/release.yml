name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            .swiftpm
          key: spm-${{ runner.arch }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.arch }}-

      - name: Build DMG
        run: ./build-release.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Brankas-${{ github.ref_name }}.dmg
          path: release/Brankas-*.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Brankas ${{ github.ref_name }}
          body_path: PRE_RELEASE.md
          files: release/Brankas-*.dmg
          generate_release_notes: true
