name: Brankas
options:
  bundleIdPrefix: com.rifqifadhlillah
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  Brankas:
    type: application
    platform: macOS
    sources:
      - path: Sources/Brankas
    dependencies:
      - sdk: LocalAuthentication.framework
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: Brankas
        CFBundleIdentifier: com.rifqifadhlillah.brankas
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: Brankas
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: Copyright © 2026. All rights reserved.
        NSPrincipalClass: NSApplication

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rifqifadhlillah.brankas
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
